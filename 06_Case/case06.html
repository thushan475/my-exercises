<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python">
    <meta name="description" content="World best web development tutorials">
    <meta name="author" content="IJSE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Case_06</title>
    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">
    <link rel="stylesheet" href="../assets/lib/normalize.css">
    <link rel="stylesheet" href="https://www.hxstrive.com/cdn/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        main{
            width: 100vw;
            height: 100vh;
            background-image: url("../assets/Car_Animation_Img/sky.jpg");
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            overflow: hidden;
            position: relative;
        }

        main > #mainFrame {
            position: relative;
            width: 300vw;
            height: 100%;
            display: flex;
            flex-direction: row;
            animation: frameAnimation 6000ms ease-in-out infinite;
            overflow: hidden;
        }

        main > section > section {
            position: relative;
            width: 100vw;
        }

        .city{
            position: absolute;
            width: 100%;
            height: Calc(100vh / 3);
            background-image: url("../assets/Car_Animation_Img/city.png");
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            bottom: 33vh;
        }

        .road{
            width: 100%;
            height: Calc(100vh / 3);
            background-image: url("../assets/Car_Animation_Img/road.jpg");
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            position: absolute;
            bottom: 0;
        }

        main > img {
            position: absolute;
            bottom: 140px;
            left: 40vw;
            width: Calc(100vh / 2);
        }

        .wheels{
            width: 75px;
            position: absolute;
            animation: wheelAnimation 6000ms ease-in-out infinite;
        }

        #wheel1{
            left: 56.5vw;
        }

        #wheel2{
            left: 42vw;
        }

        @keyframes frameAnimation {
            0%{
                transform: translateX(0);
            }
            100%{
                transform: translateX(-200vw);
            }
        }

        @keyframes wheelAnimation {
            0%{
                transform: rotate(0);
            }
            100%{
                transform: rotate(3000deg);
            }
        }

    </style>
</head>
<body>
<main>
    <section id="mainFrame">
        <section class="frame">
            <section class="city"></section>
            <section class="road"></section>
        </section>
        <section class="frame">
            <section class="city"></section>
            <section class="road"></section>
        </section>
        <section class="frame">
            <section class="city"></section>
            <section class="road"></section>
        </section>
    </section>
    <img id="carBody" src="../assets/Car_Animation_Img/car.png" alt="car">
    <img id="wheel1" class="wheels" src="../assets/Car_Animation_Img/wheel.png" alt="wheel">
    <img id="wheel2" class="wheels" src="../assets/Car_Animation_Img/wheel.png" alt="wheel">
</main>
</body>
</html>
