<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Title 9</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../assets/lib/normalize.css">

  <style>
    body {
      margin: 0;
    }

    /* GRID WRAPPER */
    .color-grid {
      width: 100vw;
      height: 100vh;

      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }

    /* GRID BOX */
    .box {
      border: 1px solid black;
    }

    /* COLORS (instead of nth-child) */
    .red { background: #E10600; }
    .violet { background: blueviolet; }
    .blue { background: blue; }
    .orange { background: orangered; }
    .dark1 { background: darkslategray; }
    .yellow { background: yellow; }
    .purple { background: purple; }
    .dark2 { background: darkslategrey; }
    .teal { background: cadetblue; }
    .lime { background: greenyellow; }
    .pink { background: deeppink; }
    .brown { background: brown; }
  </style>
</head>

<body>

<section class="color-grid">

  <div class="box red"></div>
  <div class="box violet"></div>
  <div class="box blue"></div>
  <div class="box orange"></div>

  <div class="box dark1"></div>
  <div class="box yellow"></div>
  <div class="box purple"></div>
  <div class="box dark2"></div>

  <div class="box teal"></div>
  <div class="box lime"></div>
  <div class="box pink"></div>
  <div class="box brown"></div>

</section>

</body>
</html>
